<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monad Vaults / rate check</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ---------- Tokens ---------- */
:root {
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --accent: oklch(0.68 0.18 295);
  --accent-hover: oklch(0.74 0.18 295);
  --accent-soft: oklch(0.68 0.18 295 / 0.14);
  --accent-fg: white;

  --bg: #0E0E11;
  --surface: #16161B;
  --surface-2: #1C1C22;
  --surface-3: #24242C;
  --border: oklch(0.25 0.01 280);
  --border-strong: oklch(0.32 0.01 280);
  --text: oklch(0.96 0.005 280);
  --text-2: oklch(0.78 0.01 280);
  --muted: oklch(0.58 0.01 280);
  --good: oklch(0.72 0.16 150);
  --warn: oklch(0.78 0.16 70);
  --bad: oklch(0.68 0.20 25);
  --shadow: 0 1px 0 rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.25);

  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 10px;
  --row-h: 56px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--text);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
input { font-family: inherit; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tnum { font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }

/* ---------- Layout ---------- */
.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 32px 80px;
}

/* ---------- Header ---------- */
.app-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-bottom: 20px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; letter-spacing: -0.01em;
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), oklch(0.45 0.20 305));
  display: grid; place-items: center;
  color: var(--accent-fg);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
}
.brand-title { font-size: 15px; }
.brand-sub { color: var(--muted); font-size: 12px; font-weight: 400; }

.header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.btn {
  height: 34px;
  padding: 0 14px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--border-strong); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.primary {
  background: var(--accent); color: var(--accent-fg);
  border-color: var(--accent);
}
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

/* ---------- Stats ---------- */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
}
.stat {
  background: var(--surface);
  padding: 16px 20px;
}
.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.stat-meta { font-size: 12px; color: var(--text-2); margin-top: 4px; }

/* ---------- Toolbar ---------- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 280px;
  height: 38px;
  display: flex; align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 0 12px;
  gap: 8px;
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search-box svg { color: var(--muted); flex-shrink: 0; }
.search-box input {
  flex: 1;
  border: none; outline: none;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  height: 100%;
}
.search-box input::placeholder { color: var(--muted); }

.chip-row {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 16px;
}
.chip-line {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center;
}
.chip {
  height: 28px;
  padding: 0 10px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  transition: all 0.12s;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.chip-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.chip.active .chip-count { color: var(--accent); }
.chip-clear { color: var(--muted); }

/* ---------- Atoms ---------- */
.proj-mark {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 11px;
  color: white;
  overflow: hidden;
  flex-shrink: 0;
}
.proj-mark img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: inherit; }
.token-mark {
  display: inline-grid; place-items: center;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: -0.02em;
  color: white;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--surface-2);
  border: 1px solid var(--border);
}
.token-mark img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.apy-display { display: flex; flex-direction: column; align-items: flex-end; }
.apy-total {
  font-family: var(--font-mono);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  color: var(--text);
}
.apy-md .apy-total { font-size: 17px; }
.apy-lg .apy-total { font-size: 28px; letter-spacing: -0.03em; }
.apy-parts {
  display: flex; gap: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}
.apy-base { color: var(--text-2); }
.apy-inc { color: var(--accent); }
.apy-plus { color: var(--muted); }

.util-cell {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.util-pct {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  min-width: 30px;
  text-align: right;
}
.util-bar {
  display: inline-block;
  width: 64px; height: 4px;
  background: var(--surface-3);
  border-radius: 999px;
  overflow: hidden;
}
.util-fill {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
}

/* ---------- Table ---------- */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.vault-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.vault-table thead th {
  position: sticky; top: 0;
  background: var(--surface);
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.vault-table thead th.nosort { cursor: default; }
.vault-table thead th.right { text-align: right; }
.vault-table thead th.sorted { color: var(--text); }
.vault-table thead th .arrow {
  display: inline-block;
  margin-left: 4px;
  font-size: 9px;
  color: var(--accent);
}
.vault-table tbody td {
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.vault-table tbody tr:last-child td { border-bottom: none; }
.vault-table tbody tr { transition: background 0.12s; }
.vault-table tbody tr:hover { background: var(--surface-2); }

.cell-vault { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.cell-vault-name {
  font-weight: 500;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 280px;
}
.cell-vault-curator { font-size: 11px; color: var(--muted); }
.cell-token {
  display: flex; align-items: center; gap: 10px;
}
.cell-token-name {
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
}
.cell-project {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--text-2);
}
.cell-num {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  text-align: right;
  font-size: 13px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.cell-num.dim { color: var(--text-2); }
.cell-action {
  display: flex; gap: 4px; justify-content: flex-end;
}
.row-action {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--muted);
  opacity: 0;
  transition: all 0.12s;
  cursor: pointer;
}
.vault-table tbody tr:hover .row-action { opacity: 1; }
.row-action:hover { background: var(--surface-3); color: var(--text); }
.row-action.danger:hover { background: oklch(0.68 0.20 25 / 0.16); color: var(--bad); }

.row-error td { color: var(--bad); font-size: 12px; }

/* ---------- Status bar ---------- */
.status-bar {
  display: flex; align-items: center; gap: 12px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--muted);
  font-family: var(--font-mono);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--good);
  box-shadow: 0 0 0 3px oklch(0.72 0.16 150 / 0.15);
}
.status-dot.refreshing { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.status-spacer { margin-left: auto; }

/* ---------- Add vault modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: oklch(0 0 0 / 0.55);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  z-index: 50;
  animation: fade 0.15s ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 460px;
  max-width: 92vw;
  box-shadow: 0 24px 60px rgba(0,0,0,0.45);
}
.modal h3 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
.modal p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal input {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-mono);
  outline: none;
}
.modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- Empty ---------- */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
}
.empty h4 { margin: 0 0 6px; color: var(--text); font-weight: 500; }

/* ---------- Responsive ---------- */
@media (max-width: 880px) {
  .app { padding: 20px 16px 60px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .vault-table thead th.hide-md, .vault-table tbody td.hide-md { display: none; }
}
@media (max-width: 560px) {
  .stats { grid-template-columns: 1fr; }
  .vault-table thead th.hide-sm, .vault-table tbody td.hide-sm { display: none; }
}

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.9s linear infinite; }
.row-loading { opacity: 0.45; }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <span class="brand-title">Monad Vaults</span>
        <span class="brand-sub">/ rate check</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" id="refreshBtn">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        <span id="refreshLabel">Refresh</span>
      </button>
      <button class="btn primary" id="addBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Add vault
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Search vault, curator, or paste a vault URL…" />
    </div>
  </div>

  <div class="chip-row" id="chipRow"></div>

  <div id="tableHost"></div>

  <div class="status-bar">
    <span id="statusDot" class="status-dot"></span>
    <span id="statusText">Loading…</span>
    <span class="status-spacer"></span>
    <span id="statusCount"></span>
  </div>
</div>

<div id="modalRoot"></div>

<script>
const STORAGE_KEY = "vault_urls_v4";
const DEFAULT_URLS = [
  "https://app.morpho.org/monad/vault/0x21649703fe63265058e9f22582552561Af4AfA3f/august-usdc",
  "https://app.morpho.org/monad/vault/0xba8424EBBEd6C51bEa6d6D903B8815838E6a0322/steakhouse-prime-eth",
  "https://app.morpho.org/monad/vault/0xc402B0cACC0C684427dAA40d964c8AE6fDbb96f7/hyperithm-cbbtc-apex",
  "https://app.neverland.money/markets/monad/weth/analytics",
  "https://app.neverland.money/markets/monad/wmon/analytics",
  "https://app.neverland.money/markets/monad/usdt0/analytics",
  "https://app.neverland.money/markets/monad/ausd/analytics",
  "https://app.neverland.money/markets/monad/usdc/analytics",
  "https://app.euler.finance/earn/0xA981f053C118FE4dB0e1aEBA192AAD20Ec7F7801?network=143",
  "https://app.euler.finance/earn/0x2C803c8C3C57b9D4A9abA011615561315c2b6aC1?network=143",
  "https://app.euler.finance/earn/0x598035A2E984993229f6FA4C8C3eCf6c52aD51b5?network=143",
  "https://app.euler.finance/earn/0x9D42b0D57e88771B365e30c0A589Fcdbeca8828c?network=143",
  "https://app.euler.finance/earn/0xE1BcA19baA63894D374578320551633320436523?network=143",
  "https://app.euler.finance/earn/0xb58915867D28759dcD12e5e6610F72a9eDF4758F?network=143",
];

const CHAIN_NAMES = { 1: "Ethereum", 8453: "Base", 143: "Monad", 10143: "Monad Testnet" };
const MONAD_RPC = "https://rpc.monad.xyz";

const PROJECT_LOGOS = {
  Morpho: "logos/morpho.png",
  Euler: "logos/euler.png",
  Neverland: "logos/neverland.png",
};
const TOKEN_LOGOS = {
  USDC:  "https://assets.coingecko.com/coins/images/6319/small/usdc.png",
  USDT:  "https://assets.coingecko.com/coins/images/325/small/Tether.png",
  USDT0: "https://assets.coingecko.com/coins/images/53705/standard/usdt0.jpg",
  AUSD:  "logos/ausd.png",
  WETH:  "https://assets.coingecko.com/coins/images/2518/small/weth.png",
  ETH:   "https://assets.coingecko.com/coins/images/279/small/ethereum.png",
  WBTC:  "https://assets.coingecko.com/coins/images/7598/small/wrapped_bitcoin_wbtc.png",
  cbBTC: "https://assets.coingecko.com/coins/images/40143/small/cbbtc.webp",
  WMON:  "logos/wmon.png",
  MON:   "logos/wmon.png",
};

function loadUrls() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [...DEFAULT_URLS];
}
function saveUrls(urls) { localStorage.setItem(STORAGE_KEY, JSON.stringify(urls)); }

function parseUrl(url) {
  try {
    const u = new URL(url);
    const host = u.hostname;
    if (host.includes("morpho.org")) {
      const parts = u.pathname.split("/").filter(Boolean);
      const chainSlug = parts[0];
      const address = parts[2];
      const chainId = chainSlug === "monad" ? 143 : chainSlug === "base" ? 8453 : chainSlug === "ethereum" ? 1 : null;
      return { project: "Morpho", chainId, address, raw: url };
    }
    if (host.includes("euler.finance")) {
      const parts = u.pathname.split("/").filter(Boolean);
      const address = parts[1];
      const chainId = parseInt(u.searchParams.get("network") || "1", 10);
      return { project: "Euler", chainId, address, raw: url };
    }
    if (host.includes("neverland.money")) {
      const parts = u.pathname.split("/").filter(Boolean);
      const chainSlug = parts[1];
      const asset = (parts[2] || "").toUpperCase();
      const chainId = chainSlug === "monad" ? 143 : null;
      return { project: "Neverland", chainId, address: null, asset, raw: url };
    }
  } catch (e) {}
  return { project: "Unknown", chainId: null, address: null, raw: url };
}

function fmtUsd(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
  return "$" + n.toFixed(0);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return "—";
  return (n * 100).toFixed(2) + "%";
}
function fmtPctShort(n) {
  if (n == null || isNaN(n)) return "—";
  return (n * 100).toFixed(1) + "%";
}
function escHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c]);
}

// ----------------- Atom builders -----------------
function tokenMarkHtml(token, size = 28) {
  const sz = `width:${size}px;height:${size}px;`;
  const src = TOKEN_LOGOS[token] || TOKEN_LOGOS[(token || "").toUpperCase()];
  if (src) {
    return `<span class="token-mark" style="${sz}"><img src="${escHtml(src)}" alt="${escHtml(token)}" /></span>`;
  }
  // Fallback: monogram with hashed color
  const palette = ["oklch(0.62 0.19 295)","oklch(0.65 0.14 230)","oklch(0.68 0.13 160)","oklch(0.70 0.14 80)","oklch(0.65 0.16 25)","oklch(0.60 0.13 320)"];
  let h = 0;
  for (let i = 0; i < (token || "").length; i++) h = (h * 31 + token.charCodeAt(i)) >>> 0;
  const bg = palette[h % palette.length];
  const initials = (token || "?").slice(0, (token || "").startsWith("cb") ? 4 : 3).toUpperCase();
  const fontSize = size <= 24 ? 9 : size <= 32 ? 10 : 11;
  return `<span class="token-mark" style="${sz}background:${bg};font-size:${fontSize}px;color:white;border:none;">${escHtml(initials)}</span>`;
}
function projectMarkHtml(project, size = 18) {
  const src = PROJECT_LOGOS[project];

// ----------------- Morpho -----------------
async function fetchMorpho(parsed) {
  const query = `
    query($address: String!, $chainId: Int!) {
      vaultByAddress(address: $address, chainId: $chainId) {
        name symbol asset { symbol }
        liquidity { usd }
        state {
          totalAssetsUsd netApy netApyExcludingRewards
          curators { name }
          allRewards { supplyApr asset { symbol } }
        }
      }
    }`;
  const res = await fetch("https://blue-api.morpho.org/graphql", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, variables: { address: parsed.address, chainId: parsed.chainId } }),
  });
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  const v = json.data?.vaultByAddress;
  if (!v) throw new Error("Not found");
  const s = v.state || {};
  const rewards = (s.allRewards || []).map(r => ({ symbol: r.asset?.symbol, apr: r.supplyApr || 0 }));
  const rewardsTotal = rewards.reduce((a, r) => a + r.apr, 0);
  return {
    chainId: parsed.chainId,
    project: "Morpho",
    token: v.asset?.symbol || "—",
    vaultName: v.name || v.symbol,
    curator: (s.curators || []).map(c => c.name).join(", ") || "—",
    depositsUsd: s.totalAssetsUsd,
    liquidityUsd: v.liquidity?.usd,
    apyTotal: s.netApy,
    apyBase: s.netApyExcludingRewards,
    apyIncentives: rewardsTotal,
    incentiveDetails: rewards,
  };
}

// ----------------- Neverland -----------------
let neverlandApyCache = { data: null, ts: 0 };
let llamaLendBorrowCache = { data: null, ts: 0 };
let llamaPoolsCache = { data: null, ts: 0 };
async function fetchNeverlandApy() {
  if (!neverlandApyCache.data || Date.now() - neverlandApyCache.ts > 30_000) {
    const res = await fetch("https://app.neverland.money/api/pool-apy");
    if (!res.ok) throw new Error("pool-apy " + res.status);
    neverlandApyCache = { data: await res.json(), ts: Date.now() };
  }
  return neverlandApyCache.data;
}
async function fetchLlamaPools() {
  if (!llamaPoolsCache.data || Date.now() - llamaPoolsCache.ts > 60_000) {
    const res = await fetch("https://yields.llama.fi/pools");
    if (!res.ok) throw new Error("llama pools " + res.status);
    llamaPoolsCache = { data: (await res.json()).data, ts: Date.now() };
  }
  return llamaPoolsCache.data;
}
async function fetchLlamaLendBorrow() {
  if (!llamaLendBorrowCache.data || Date.now() - llamaLendBorrowCache.ts > 60_000) {
    const res = await fetch("https://yields.llama.fi/lendBorrow");
    if (!res.ok) throw new Error("llama lendBorrow " + res.status);
    llamaLendBorrowCache = { data: await res.json(), ts: Date.now() };
  }
  return llamaLendBorrowCache.data;
}
async function fetchNeverland(parsed) {
  const apyData = await fetchNeverlandApy();
  const reserve = Object.values(apyData.reserves || {}).find(r => (r.symbol || "").toUpperCase() === parsed.asset);
  if (!reserve) throw new Error("Asset " + parsed.asset + " not found");
  const supply = reserve.supply || {};
  const base = parseFloat(supply.baseAPY) / 100;
  const dust = parseFloat(supply.dustIncentiveAPR) / 100;
  const ext = parseFloat(supply.externalAPY || "0") / 100;
  const total = parseFloat(supply.totalAPY) / 100;
  const incentiveDetails = [];
  if (dust) incentiveDetails.push({ symbol: "DUST", apr: dust });
  if (ext) incentiveDetails.push({ symbol: supply.externalProvider || "external", apr: ext });

  let depositsUsd = null, liquidityUsd = null;
  try {
    const pools = await fetchLlamaPools();
    const pool = pools.find(p => p.project === "neverland" && p.chain === "Monad" && (p.symbol || "").toUpperCase() === parsed.asset);
    if (pool) {
      const lb = await fetchLlamaLendBorrow();
      const lbEntry = lb.find(x => x.pool === pool.pool);
      if (lbEntry) {
        depositsUsd = lbEntry.totalSupplyUsd;
        liquidityUsd = Math.max(0, (lbEntry.totalSupplyUsd || 0) - (lbEntry.totalBorrowUsd || 0));
      } else {
        depositsUsd = pool.tvlUsd;
      }
    }
  } catch (e) {}

  return {
    chainId: parsed.chainId,
    project: "Neverland",
    token: reserve.symbol || "—",
    vaultName: reserve.symbol,
    curator: "—",
    depositsUsd,
    liquidityUsd,
    apyTotal: total,
    apyBase: base,
    apyIncentives: dust + ext,
    incentiveDetails,
  };
}

// ----------------- Euler (RPC + DefiLlama + Merkl) -----------------
let rpcQueue = Promise.resolve();
async function rpcBatch(calls) {
  const prev = rpcQueue;
  let release;
  rpcQueue = new Promise(r => { release = r; });
  await prev;
  try {
    const result = await rpcBatchInner(calls);
    await new Promise(r => setTimeout(r, 250));
    return result;
  } finally {
    release();
  }
}
async function rpcBatchInner(calls) {
  if (!calls.length) return [];
  const CHUNK = 15;
  const out = new Array(calls.length).fill(null);
  for (let start = 0; start < calls.length; start += CHUNK) {
    const chunk = calls.slice(start, start + CHUNK);
    let toDo = chunk.map((c, i) => ({ c, id: start + i }));
    for (let attempt = 0; attempt < 5 && toDo.length; attempt++) {
      const body = toDo.map(x => ({
        jsonrpc: "2.0", id: x.id, method: "eth_call",
        params: [{ to: x.c.to, data: x.c.data }, "latest"],
      }));
      let parsed = null;
      try {
        const res = await fetch(MONAD_RPC, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (res.status === 429) {
          await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
          continue;
        }
        parsed = await res.json();
      } catch (e) {
        await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
        continue;
      }
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      const gotIds = new Set();
      for (const item of arr) {
        if (item && typeof item.id === "number") {
          if (item.error) {
            if (/revert/i.test(item.error.message || "")) {
              out[item.id] = null;
              gotIds.add(item.id);
            }
          } else {
            out[item.id] = item.result;
            gotIds.add(item.id);
          }
        }
      }
      toDo = toDo.filter(x => !gotIds.has(x.id));
      if (toDo.length) await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
    }
  }
  return out;
}
function decodeHexString(hex) {
  if (!hex || hex === "0x") return null;
  hex = hex.replace(/^0x/, "");
  if (hex.length < 128) return null;
  const len = parseInt(hex.slice(64, 128), 16);
  const raw = hex.slice(128, 128 + len * 2);
  return new TextDecoder().decode(new Uint8Array((raw.match(/.{2}/g) || []).map(b => parseInt(b, 16))));
}
function hexToBigInt(hex) {
  if (!hex || hex === "0x") return 0n;
  return BigInt(hex);
}
async function fetchMerklRewards(chainId, address) {
  try {
    const url = `https://api.merkl.xyz/v4/opportunities?chainId=${chainId}&identifier=${address}`;
    const res = await fetch(url);
    if (!res.ok) return { apr: 0, breakdown: [] };
    const arr = await res.json();
    if (!Array.isArray(arr) || !arr.length) return { apr: 0, breakdown: [] };
    const totalApr = arr.reduce((a, o) => a + (o.apr || 0), 0) / 100;
    const symbols = [...new Set(arr.flatMap(o =>
      (o.rewardsRecord?.breakdowns || []).map(b => b.token?.symbol).filter(Boolean)
    ))];
    const breakdown = symbols.length
      ? [{ symbol: symbols.join(" + "), apr: totalApr }]
      : [{ symbol: "Merkl", apr: totalApr }];
    return { apr: totalApr, breakdown };
  } catch (e) { return { apr: 0, breakdown: [] }; }
}
async function fetchEuler(parsed) {
  const addr = parsed.address;
  const padAddr = "000000000000000000000000" + addr.replace(/^0x/, "").toLowerCase();
  const [nameHex, assetHex, totalAssetsHex, queueLenHex] = await rpcBatch([
    { to: addr, data: "0x06fdde03" },
    { to: addr, data: "0x38d52e0f" },
    { to: addr, data: "0x01e1d114" },
    { to: addr, data: "0x33f91ebb" },
  ]);
  const vaultName = decodeHexString(nameHex) || "Euler Vault";
  const assetAddr = "0x" + (assetHex || "").slice(-40);
  const totalAssetsRaw = hexToBigInt(totalAssetsHex);
  const queueLen = Number(hexToBigInt(queueLenHex));

  const pad32 = n => n.toString(16).padStart(64, "0");
  const queueCalls = Array.from({ length: queueLen }, (_, i) => ({ to: addr, data: "0x62518ddf" + pad32(i) }));
  const round2 = await rpcBatch([
    { to: assetAddr, data: "0x313ce567" },
    { to: assetAddr, data: "0x95d89b41" },
    { to: assetAddr, data: "0x70a08231" + padAddr },
    ...queueCalls,
  ]);
  const decimals = Number(hexToBigInt(round2[0]));
  const assetSymbol = decodeHexString(round2[1]) || "";
  const idleRaw = hexToBigInt(round2[2]);
  const strategies = round2.slice(3)
    .filter(Boolean)
    .map(h => "0x" + h.slice(-40))
    .filter(s => s !== "0x0000000000000000000000000000000000000000");

  let strategiesMaxWithdraw = 0n;
  const perStrategy = [];
  if (strategies.length) {
    const calls = [];
    for (const s of strategies) {
      calls.push({ to: s, data: "0xce96cb77" + padAddr });
      calls.push({ to: s, data: "0x70a08231" + padAddr });
      calls.push({ to: s, data: "0x961be391" });
      calls.push({ to: s, data: "0x47bd3718" });
      calls.push({ to: s, data: "0x7c3a00fd" });
    }
    const res = await rpcBatch(calls);
    for (let i = 0; i < strategies.length; i++) {
      const b = i * 5;
      const mw = hexToBigInt(res[b]);
      const bal = hexToBigInt(res[b + 1]);
      const cash = hexToBigInt(res[b + 2]);
      const borrows = hexToBigInt(res[b + 3]);
      const ir = hexToBigInt(res[b + 4]);
      strategiesMaxWithdraw += mw;
      perStrategy.push({ address: strategies[i], balanceShares: bal, cash, borrows, interestRate: ir });
    }
  }
  const availableRaw = idleRaw + strategiesMaxWithdraw;

  if (perStrategy.length) {
    const calls = perStrategy.map(s => ({
      to: s.address,
      data: "0x07a2d13a" + s.balanceShares.toString(16).padStart(64, "0"),
    }));
    const res = await rpcBatch(calls);
    for (let i = 0; i < perStrategy.length; i++) {
      perStrategy[i].allocation = hexToBigInt(res[i]);
    }
  }

  const SECONDS_PER_YEAR = 31556952;
  const INTEREST_FEE = 0.1;
  let num = 0, den = 0;
  for (const s of perStrategy) {
    const stratTotal = s.cash + s.borrows;
    if (stratTotal === 0n || s.allocation === 0n) continue;
    const util = Number(s.borrows) / Number(stratTotal);
    const ratePerSec = Number(s.interestRate) / 1e27;
    if (ratePerSec <= 0) continue;
    const borrowAPY = Math.expm1(Math.log1p(ratePerSec) * SECONDS_PER_YEAR);
    const supplyAPY = borrowAPY * util * (1 - INTEREST_FEE);
    const w = Number(s.allocation);
    num += supplyAPY * w; den += w;
  }
  const chainBaseApy = den > 0 ? num / den : null;

  const totalAssets = Number(totalAssetsRaw) / Math.pow(10, decimals);
  const availableAssets = Number(availableRaw) / Math.pow(10, decimals);

  let depositsUsd = null, liquidityUsd = null, baseApy = chainBaseApy;
  try {
    const pools = await fetchLlamaPools();
    const pool = pools.find(p =>
      p.chain === "Monad" &&
      (p.project === "euler-v2" || p.project === "euler") &&
      ((p.poolMeta || "").toLowerCase() === vaultName.toLowerCase() ||
        ((p.underlyingTokens || []).some(t => t.toLowerCase() === assetAddr.toLowerCase()) && (p.symbol || "").toUpperCase() === assetSymbol.toUpperCase()))
    );
    if (pool) {
      depositsUsd = pool.tvlUsd;
      if (baseApy == null) baseApy = (pool.apyBase || 0) / 100;
      if (totalAssets > 0 && availableAssets > 0) {
        const pricePerUnit = pool.tvlUsd / totalAssets;
        liquidityUsd = availableAssets * pricePerUnit;
      }
    }
  } catch (e) {}

  const rewards = await fetchMerklRewards(parsed.chainId, addr);
  const apyTotal = (baseApy || 0) + rewards.apr;

  return {
    chainId: parsed.chainId,
    project: "Euler",
    token: assetSymbol || "—",
    vaultName,
    curator: "—",
    depositsUsd,
    liquidityUsd,
    apyTotal,
    apyBase: baseApy,
    apyIncentives: rewards.apr,
    incentiveDetails: rewards.breakdown,
  };
}

async function fetchRow(parsed) {
  if (parsed.project === "Morpho") return fetchMorpho(parsed);
  if (parsed.project === "Euler") return fetchEuler(parsed);
  if (parsed.project === "Neverland") return fetchNeverland(parsed);
  throw new Error("Unknown protocol");
}

const state = {
  urls: loadUrls(),
  data: {},
  sort: { key: "apyTotal", dir: "desc" },
  tokenFilter: new Set(),
  projectFilter: new Set(),
  search: "",
  refreshing: false,
  lastUpdate: null,
};

const COLUMNS = [
  { key: "token", label: "Token", sortable: true, type: "string", get: r => r.token },
  { key: "vault", label: "Vault", sortable: true, type: "string", get: r => r.vaultName },
  { key: "project", label: "Protocol", sortable: true, type: "string", get: r => r.project, hide: "hide-sm" },
  { key: "deposits", label: "Deposits", sortable: true, type: "number", get: r => r.depositsUsd, right: true, hide: "hide-md" },
  { key: "liquidity", label: "Liquidity", sortable: true, type: "number", get: r => r.liquidityUsd, right: true, hide: "hide-md" },
  { key: "util", label: "Util", sortable: false, hide: "hide-md" },
  { key: "apyTotal", label: "APY", sortable: true, type: "number", get: r => r.apyTotal, right: true },
  { key: "actions", label: "", sortable: false },
];

function buildRows() {
  return state.urls.map(url => {
    const parsed = parseUrl(url);
    const entry = state.data[url] || {};
    const d = entry.data;
    return {
      url,
      parsed,
      entry,
      project: d?.project || parsed.project,
      token: d?.token || parsed.asset || "?",
      vaultName: d?.vaultName || (parsed.address ? parsed.address.slice(0, 10) + "…" : "Pending…"),
      curator: d?.curator || "—",
      depositsUsd: d?.depositsUsd ?? null,
      liquidityUsd: d?.liquidityUsd ?? null,
      apyTotal: d?.apyTotal ?? null,
      apyBase: d?.apyBase ?? null,
      apyIncentives: d?.apyIncentives ?? null,
      error: entry.error || null,
      loading: !!entry.loading,
    };
  });
}
function filterRows(rows) {
  let out = rows;
  if (state.tokenFilter.size) out = out.filter(r => state.tokenFilter.has(r.token));
  if (state.projectFilter.size) out = out.filter(r => state.projectFilter.has(r.project));
  if (state.search) {
    const q = state.search.toLowerCase();
    out = out.filter(r =>
      [r.token, r.vaultName, r.project, r.curator].filter(Boolean).some(s => s.toLowerCase().includes(q))
    );
  }
  return out;
}
function sortRows(rows) {
  if (!state.sort.key) return rows;
  const col = COLUMNS.find(c => c.key === state.sort.key);
  if (!col || !col.sortable) return rows;
  const dirMul = state.sort.dir === "asc" ? 1 : -1;
  const arr = rows.slice();
  arr.sort((a, b) => {
    const va = col.get(a), vb = col.get(b);
    const aN = va == null || va === "";
    const bN = vb == null || vb === "";
    if (aN && bN) return 0;
    if (aN) return 1;
    if (bN) return -1;
    if (col.type === "number") return (va - vb) * dirMul;
    return String(va).localeCompare(String(vb)) * dirMul;
  });
  return arr;
}

function renderChips(rows) {
  const tokenMap = new Map();
  const projectMap = new Map();
  rows.forEach(r => {
    if (r.token) tokenMap.set(r.token, (tokenMap.get(r.token) || 0) + 1);
    if (r.project) projectMap.set(r.project, (projectMap.get(r.project) || 0) + 1);
  });
  const tokens = [...tokenMap.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const projects = [...projectMap.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

  const host = document.getElementById("chipRow");
  const projectChips = projects.map(([p, count]) => `
    <button class="chip ${state.projectFilter.has(p) ? "active" : ""}" data-project="${escHtml(p)}">
      ${projectMarkHtml(p, 14)}
      ${escHtml(p)}
      <span class="chip-count">${count}</span>
    </button>
  `).join("");
  const tokenChips = tokens.map(([tok, count]) => `
    <button class="chip ${state.tokenFilter.has(tok) ? "active" : ""}" data-token="${escHtml(tok)}">
      ${tokenMarkHtml(tok, 16)}
      ${escHtml(tok)}
      <span class="chip-count">${count}</span>
    </button>
  `).join("");
  const anyActive = state.tokenFilter.size || state.projectFilter.size;
  host.innerHTML = `
    <div class="chip-line">
      <span class="muted" style="font-size:12px;margin-right:4px;min-width:64px;">Protocols</span>
      ${projectChips}
    </div>
    <div class="chip-line">
      <span class="muted" style="font-size:12px;margin-right:4px;min-width:64px;">Tokens</span>
      ${tokenChips}
      ${anyActive ? `<button class="chip chip-clear" data-clear="1">Clear all</button>` : ""}
    </div>
  `;
  host.querySelectorAll(".chip[data-token]").forEach(c => c.addEventListener("click", () => {
    const t = c.dataset.token;
    if (state.tokenFilter.has(t)) state.tokenFilter.delete(t); else state.tokenFilter.add(t);
    renderAll();
  }));
  host.querySelectorAll(".chip[data-project]").forEach(c => c.addEventListener("click", () => {
    const p = c.dataset.project;
    if (state.projectFilter.has(p)) state.projectFilter.delete(p); else state.projectFilter.add(p);
    renderAll();
  }));
  host.querySelectorAll(".chip[data-clear]").forEach(c => c.addEventListener("click", () => {
    state.tokenFilter.clear();
    state.projectFilter.clear();
    renderAll();
  }));
}

      <button class="row-action danger" data-remove="${encodeURIComponent(r.url)}" title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div></td>`;
    return `<tr class="${cls.join(" ")}">${cells}</tr>`;
  }).join("");

  host.innerHTML = `<div class="table-card"><table class="vault-table"><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
  host.querySelectorAll("th[data-sortable='1']").forEach(th => th.addEventListener("click", () => {
    const key = th.dataset.key;
    const col = COLUMNS.find(c => c.key === key);
    if (!col) return;
    if (state.sort.key === key) {
      state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
    } else {
      state.sort.key = key;
      state.sort.dir = col.type === "number" ? "desc" : "asc";
    }
    renderAll();
  }));
  host.querySelectorAll("button[data-remove]").forEach(btn => btn.addEventListener("click", () => {
    removeUrl(decodeURIComponent(btn.dataset.remove));
  }));
}
function renderStatus(filteredCount, totalCount) {
  const dot = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  const count = document.getElementById("statusCount");
  if (state.refreshing) {
    dot.classList.add("refreshing");
    text.textContent = "Fetching from Morpho, Euler, Neverland…";
  } else {
    dot.classList.remove("refreshing");
    text.textContent = state.lastUpdate ? `Updated ${state.lastUpdate.toLocaleTimeString()}` : "Ready";
  }
  count.textContent = filteredCount === totalCount ? `${totalCount} vault${totalCount === 1 ? "" : "s"}` : `${filteredCount} of ${totalCount} vaults`;
}
function renderAll() {
  const all = buildRows();
  const filtered = filterRows(all);
  const sorted = sortRows(filtered);
  renderChips(all);
  renderTable(sorted);
  renderStatus(filtered.length, all.length);
}

// ----------------- Mutators / actions -----------------
async function refreshAll() {
  state.refreshing = true;
  state.data = {};
  state.urls.forEach(u => { state.data[u] = { loading: true }; });
  document.getElementById("refreshIcon").classList.add("spin");
  document.getElementById("refreshLabel").textContent = "Refreshing…";
  document.getElementById("refreshBtn").disabled = true;
  renderAll();
  await Promise.all(state.urls.map(async (url) => {
    try {
      state.data[url] = { data: await fetchRow(parseUrl(url)) };
    } catch (e) {
      state.data[url] = { error: e.message || String(e) };
    }
  }));
  state.refreshing = false;
  state.lastUpdate = new Date();
  document.getElementById("refreshIcon").classList.remove("spin");
  document.getElementById("refreshLabel").textContent = "Refresh";
  document.getElementById("refreshBtn").disabled = false;
  renderAll();
}
async function refreshOne(url) {
  state.data[url] = { loading: true };
  renderAll();
  try {
    state.data[url] = { data: await fetchRow(parseUrl(url)) };
  } catch (e) {
    state.data[url] = { error: e.message || String(e) };
  }
  renderAll();
}
function addUrl(url) {
  url = (url || "").trim();
  if (!url) return;
  if (state.urls.includes(url)) return;
  state.urls.push(url);
  saveUrls(state.urls);
  renderAll();
  refreshOne(url);
}
function removeUrl(url) {
  state.urls = state.urls.filter(u => u !== url);
  delete state.data[url];
  saveUrls(state.urls);
  renderAll();
}

// ----------------- Modal -----------------
function openAddModal() {
  const root = document.getElementById("modalRoot");
  root.innerHTML = `
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modalBox">
        <h3>Add vault</h3>
        <p>Paste a Morpho, Euler, or Neverland vault URL. Rates fetch automatically.</p>
        <input id="modalInput" type="text" placeholder="https://app.morpho.org/monad/vault/0x…" />
        <div class="modal-actions">
          <button class="btn" id="modalCancel">Cancel</button>
          <button class="btn primary" id="modalSubmit">Add vault</button>
        </div>
      </div>
    </div>`;
  const close = () => { root.innerHTML = ""; };
  document.getElementById("modalBackdrop").addEventListener("click", close);
  document.getElementById("modalBox").addEventListener("click", e => e.stopPropagation());
  document.getElementById("modalCancel").addEventListener("click", close);
  const submit = () => {
    const v = document.getElementById("modalInput").value;
    if (v) addUrl(v);
    close();
  };
  document.getElementById("modalSubmit").addEventListener("click", submit);
  const input = document.getElementById("modalInput");
  input.focus();
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); if (e.key === "Escape") close(); });
}

// ----------------- Wire up -----------------
document.getElementById("refreshBtn").addEventListener("click", refreshAll);
document.getElementById("addBtn").addEventListener("click", openAddModal);
function looksLikeVaultUrl(s) {
  return /^https?:\/\//i.test(s) && /(morpho\.org|euler\.finance|neverland\.money)/i.test(s);
}
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", e => {
  state.search = e.target.value;
  renderAll();
});
searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const v = e.target.value.trim();
    if (looksLikeVaultUrl(v)) {
      addUrl(v);
      e.target.value = "";
      state.search = "";
      renderAll();
    }
  }
});

renderAll();
refreshAll();
</script>
